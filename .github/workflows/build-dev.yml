name: Build & Deploy (Dev)

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (dev channel)
        run: npm run build -- --channel=dev

      - name: Create redirect page
        run: |
          cat > dist/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
          <meta charset="UTF-8">
          <meta http-equiv="refresh" content="0;url=ai_marker.user.js">
          <title>AI 批改助手 (开发版) - 安装脚本</title>
          <style>
            body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f5f5f5; }
            .card { background: #fff; border-radius: 12px; padding: 40px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: center; max-width: 480px; }
            h1 { margin: 0 0 12px; font-size: 24px; }
            p { color: #666; margin: 8px 0; line-height: 1.6; }
            a { display: inline-block; margin-top: 16px; padding: 12px 32px; background: #5856d6; color: #fff; text-decoration: none; border-radius: 8px; font-size: 16px; }
            a:hover { background: #4240b0; }
            .badge { display: inline-block; padding: 2px 8px; background: rgba(88,86,214,0.12); color: rgba(88,86,214,0.9); border-radius: 4px; font-size: 12px; font-weight: 500; margin-bottom: 8px; }
            .tip { font-size: 13px; color: #999; margin-top: 16px; }
          </style>
          </head>
          <body>
          <div class="card">
            <span class="badge">开发版</span>
            <h1>AI 批改助手</h1>
            <p>正在跳转到安装脚本...</p>
            <p>如果没有自动跳转，请点击下方按钮：</p>
            <a href="ai_marker.user.js">安装脚本</a>
            <p class="tip">需要先安装 Tampermonkey 浏览器扩展（仅支持电脑端 Edge 浏览器）</p>
          </div>
          </body>
          </html>
          HTMLEOF

      - name: Upload script for server deploy
        uses: actions/upload-artifact@v4
        with:
          name: script-dist-dev
          path: |
            dist/ai_marker.user.js
            dist/manifest.json
          retention-days: 1

  # 部署到云服务器 (dev 渠道)
  deploy-server:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download script
        uses: actions/download-artifact@v4
        with:
          name: script-dist-dev
          path: dist

      - name: Read script content
        id: read-script
        run: echo "content=$(cat dist/ai_marker.user.js | base64 -w0)" >> $GITHUB_OUTPUT

      - name: Read manifest content
        id: read-manifest
        run: echo "content=$(cat dist/manifest.json | base64 -w0)" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            # 部署目录（dev 渠道）
            DEPLOY_DIR=/opt/1panel/www/sites/aimarker-suite-ota/index/ota/dev

            # 确保目录存在
            sudo mkdir -p $DEPLOY_DIR

            # 获取目录所有者
            OWNER=$(stat -c '%U:%G' "$(dirname "$DEPLOY_DIR")")

            # 写入 ai_marker.user.js
            echo '${{ steps.read-script.outputs.content }}' | base64 -d | sudo tee $DEPLOY_DIR/ai_marker.user.js > /dev/null
            sudo chown $OWNER $DEPLOY_DIR/ai_marker.user.js
            sudo chmod 644 $DEPLOY_DIR/ai_marker.user.js

            # 写入 manifest.json
            echo '${{ steps.read-manifest.outputs.content }}' | base64 -d | sudo tee $DEPLOY_DIR/manifest.json > /dev/null
            sudo chown $OWNER $DEPLOY_DIR/manifest.json
            sudo chmod 644 $DEPLOY_DIR/manifest.json

            # 验证部署
            echo "Dev 渠道部署完成，文件列表："
            ls -la $DEPLOY_DIR/
